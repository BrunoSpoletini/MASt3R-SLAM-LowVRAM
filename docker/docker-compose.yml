services:
  mast3r-slam:
    build:
      context: ..          # raíz del repo
      dockerfile: docker/Dockerfile
    image: mast3r-slam-lowvram:latest
    container_name: mast3r-slam

    # GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    volumes:
      # Código del repo
      - ..:/app
      # Datasets y resultados
      - ${HOME}/datasets:/datasets
      - ${HOME}/results:/results
      # Acceso a display X11 (para la GUI de SLAM)
      - /tmp/.X11-unix:/tmp/.X11-unix

    network_mode: host
    stdin_open: true
    tty: true